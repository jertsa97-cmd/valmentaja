<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0b1120" />
<title>Valmentaja</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  input[type=range] { accent-color: #16c784; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const USER = { height: 187, age: 29, startWeight: 103, goalWeight: 93 };

function bmr(weight) {
  return 10 * weight + 6.25 * USER.height - 5 * USER.age + 5;
}
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

function computeReadiness({ sleepHours, sleepQuality, restingHR, baselineHR, yesterdayLoad, soreness }) {
  const sleepDur = clamp((sleepHours / 7.5) * 100, 0, 100);
  const sleepQ = (sleepQuality / 5) * 100;
  const sleepScore = sleepDur * 0.6 + sleepQ * 0.4;
  let hrScore = 80;
  if (baselineHR > 0) {
    const diff = restingHR - baselineHR;
    hrScore = clamp(100 - diff * 6, 0, 100);
  }
  const loadScore = [100, 85, 65, 45][yesterdayLoad] ?? 80;
  const soreScore = (soreness / 5) * 100;
  const total = sleepScore * 0.35 + hrScore * 0.25 + loadScore * 0.25 + soreScore * 0.15;
  return Math.round(clamp(total, 0, 100));
}

function recommend(readiness, weekDay, lastHardType, weekStats) {
  // weekDay: 0=su,1=ma,2=ti,3=ke,4=to,5=pe,6=la
  // lastHardType: edellinen kova treeni ("sali" | "kesto") -> vuorottelua varten
  // weekStats: { trainDays, daysLeft } kuluvalta viikolta (ma-su) -> pakkolepoa varten
  const day = weekDay;

  // PAKKOLEPO: vähintään 2 lepopäivää/viikko -> korkeintaan 5 treenipäivää.
  // Jos treenipäiviä on jo 5 tällä viikolla, loput pakotetaan lepoon (paitsi ti salibandy, joka on kiinteä).
  if (weekStats && day !== 2) {
    const restDaysSoFar = 7 - weekStats.daysLeft - weekStats.trainDays;
    const restStillNeeded = 2 - restDaysSoFar;
    // jos jäljellä olevat päivät pitää varata levolle jotta 2 lepopäivää täyttyy
    if (weekStats.trainDays >= 5 || restStillNeeded >= weekStats.daysLeft) {
      return {
        type: "Pakkolepo", tone: "rest",
        cal: "Syö lähelle ylläpitoa, proteiini ~2 g/kg. Lepo on osa ohjelmaa.",
        warmup: [],
        blocks: [{ title: "Lepopäivä (suunniteltu)", items: [
          "Tämä on viikon pakollinen lepopäivä — vähintään 2 lepoa viikossa.",
          "Täysi lepo tai max. 20–30 min rauhallinen kävely.",
          "Kova treeni nyt veisi palautumiselta, vaikka valmius näyttäisi hyvältä.",
        ] }],
        cooldown: [],
      };
    }
  }

  // TIISTAI — salibandy
  if (day === 2) {
    return {
      type: "Salibandy-ilta", tone: "high",
      cal: "Hiilaria ~2–3 h ennen peliä, 25–30 g proteiinia pelin jälkeen.",
      warmup: ["5 min kevyt hölkkä / hyppynaru", "Dynaaminen liikkuvuus: jalan heilautukset 10/jalka, lonkka-avaajat 10/puoli, sivuloikat 10/puoli", "3× kiihdytys 20 m (60→80→90 %)"],
      blocks: [{ title: "Peli", items: ["Salibandy normaalisti — tämä on päivän kova kuorma"] }],
      cooldown: ["5 min kävely", "Venyttely: takareisi, etureisi, pohkeet, lonkankoukistajat 30 s/puoli"],
    };
  }

  // KESKIVIIKKO — kevennys salibandyn jälkeen
  if (day === 3) {
    if (readiness < 45) return {
      type: "Lepopäivä", tone: "rest",
      cal: "Syö lähelle ylläpitoa, proteiini ~2 g/kg, priorisoi uni.",
      warmup: [],
      blocks: [{ title: "Lepo", items: ["Täysi lepo TAI rauhallinen kävely 20–30 min", "Kevyt venyttely illalla, 10 min"] }],
      cooldown: [],
    };
    return {
      type: "Palauttava pyöräily", tone: "low",
      cal: "Kevyt vajaus ~400 kcal, proteiini korkealla.",
      warmup: ["5 min nousujohteinen poljenta, kevyt vastus"],
      blocks: [{ title: "Peruskestävyys", items: [
        "Pyöräily 40 min tasaisesti, syke 65–70 % maksimista (n. 120–135 bpm)",
        "Pidä poljinkadenssi 85–95 rpm, vastus kevyt — jalkojen pitää tuntua kevyiltä koko ajan",
      ] }],
      cooldown: ["5 min kevyt poljenta", "Etureisi + pohje venytys 30 s/puoli"],
    };
  }

  // KOVA PÄIVÄ (valmius 80+) — valmius ratkaisee, sali ja kesto vuorottelevat historian mukaan
  if (readiness >= 80) {
    const isGym = lastHardType !== "sali"; // jos viimeksi ei ollut sali -> nyt sali
    if (isGym) return {
      type: "Salitreeni — ylävartalo (kova)", tone: "high", hard: "sali",
      cal: "Voit syödä lähemmäs ylläpitoa, proteiini ~2 g/kg. 30 g proteiinia treenin jälkeen.",
      warmup: ["5 min soutulaite tai kevyt kävely", "Hartiakierrot + laparetraktiot 15×", "Kuminauhalla olkapään lämmittely 15×", "Penkki 1×10 tyhjällä tangolla"],
      blocks: [{ title: "Voimaharjoitus", items: [
        "1. Penkkipunnerrus — 4 sarjaa × 6 toistoa, palautus 2–3 min",
        "2. Leuanveto (tai ylätalja) — 4 × 8, palautus 2 min",
        "3. Pystypunnerrus pystyssä — 3 × 8, palautus 2 min",
        "4. Kulmasoutu tangolla — 4 × 8, palautus 90 s",
        "5. Vinopenkki käsipainoilla — 3 × 10, palautus 90 s",
        "6. Hauiskääntö 3 × 12 + ojentajapunnerrus taljassa 3 × 12 (supersarja), palautus 60 s",
      ] }],
      cooldown: ["5 min kevyt kävely", "Rinta + olkapää + hauis venytys 30 s/puoli"],
    };
    // kova kestävyys
    if (day === 6 || day === 0) return {
      type: "Pitkä lenkki (kova)", tone: "high", hard: "kesto",
      cal: "Korkea kulutus — voit syödä lähemmäs ylläpitoa. Juo riittävästi.",
      warmup: ["10 min nousujohteisesti kevyestä peruskestävyyteen"],
      blocks: [{ title: "Pitkä peruskestävyys", items: [
        "Juoksu 60–75 min TAI pyöräily 90 min",
        "Syke 70–75 % maksimista (n. 135–150 bpm) — puhetahti pitää säilyä",
        "Tasainen vauhti koko matkan, ei kiihdytyksiä",
      ] }],
      cooldown: ["5 min kävely", "Koko alavartalon venyttely 5 min"],
    };
    return {
      type: "Juoksuintervallit (kova)", tone: "high", hard: "kesto",
      cal: "Voit syödä lähemmäs ylläpitoa. Hyvä rasvanpolttopäivä.",
      warmup: ["10 min kevyt hölkkä", "4× loikat 20 m + 3× kiihdytys 60 m (nousujohteinen)"],
      blocks: [{ title: "Kovavauhtinen intervalli", items: [
        "6 × 400 m kovaa (n. 90 % vauhdista)",
        "Palautus jokaisen välissä: 200 m hölkkä TAI 90 s kävely",
        "Vauhdin pitää pysyä samana 1.–6. vedossa — älä lähde liian lujaa",
      ] }],
      cooldown: ["10 min kevyt hölkkä", "Takareisi + pohje + lonkankoukistaja 30 s/puoli"],
    };
  }

  // KESKIRASKAS (60–79)
  if (readiness >= 60) {
    return {
      type: "Tasainen kestävyys (keskiraskas)", tone: "mid",
      cal: "Pidä vajaus maltillisena, ~400–500 kcal.",
      warmup: ["10 min nousujohteinen lämmittely"],
      blocks: [{ title: "Peruskestävyys", items: [
        "Juoksu 40 min TAI pyöräily 50 min",
        "Syke 70–75 % maksimista (n. 135–148 bpm)",
        "Tasainen, mukava vauhti — pystyt puhumaan lyhyitä lauseita",
      ] }],
      cooldown: ["5 min kävely", "Alavartalon venyttely 5 min"],
    };
  }

  // KEVYT (40–59)
  if (readiness >= 40) {
    return {
      type: "Kevyt palautuminen", tone: "low",
      cal: "Säilytä proteiini korkealla (~2 g/kg), kevyt vajaus.",
      warmup: [],
      blocks: [{ title: "Aktiivinen palautuminen", items: [
        "Reipas kävely 35 min TAI kevyt pyöräily 30 min (syke alle 65 %)",
        "Liikkuvuus 15 min: lonkat, rintaranka, nilkat",
        "Ei kovaa kuormaa, ei sykepiikkejä",
      ] }],
      cooldown: ["Rauhallinen venyttely 5 min"],
    };
  }

  // LEPO (<40)
  return {
    type: "Lepopäivä", tone: "rest",
    cal: "Syö lähelle ylläpitoa, proteiini ~2 g/kg, priorisoi uni.",
    warmup: [],
    blocks: [{ title: "Lepo", items: ["Täysi lepo tai max. 20 min rauhallinen kävely", "Keho ei ole valmis kuormaan — palautuminen on nyt tärkeintä"] }],
    cooldown: [],
  };
}

const KEY = "pt_logs_v1";
const WKEY = "pt_weights_v1";

// Lukee URL-parametrit jotka Shortcut antaa, esim:
// ?sleepHours=7.2&restingHR=55&yesterdayLoad=2&weight=101.3
function readParams() {
  const p = new URLSearchParams(window.location.search);
  const out = {};
  ["sleepHours","sleepQuality","restingHR","yesterdayLoad","soreness","weight"].forEach((k) => {
    let v = p.get(k);
    if (v !== null && v !== "") {
      // siedä pilkkua desimaalierottimena ja mahdollista sekuntiarvoa
      v = v.replace(",", ".");
      out[k] = v;
    }
  });
  // Apple Healthin uni: tulee sekunteina ja jaksot päällekkäin (n. tuplana).
  // Hoidetaan muunnos kokonaan tässä, jotta Shortcutiin ei tarvitse koskea.
  if (out.sleepHours) {
    let sh = parseFloat(out.sleepHours);
    if (sh > 1000) {
      // raaka sekuntiarvo Applelta -> tunnit, ja poista tuplaus
      sh = sh / 7200;
    } else if (sh > 20) {
      // sekunteja mutta ei tuplattu
      sh = sh / 3600;
    }
    sh = Math.round(sh * 10) / 10;
    out.sleepHours = String(clamp(sh, 0, 14));
  }
  return out;
}

function App() {
  const [logs, setLogs] = useState([]);
  const [weights, setWeights] = useState([]);
  const [baselineHR, setBaselineHR] = useState(0);
  const [form, setForm] = useState({
    sleepHours: 7.5, sleepQuality: 4, restingHR: 58, yesterdayLoad: 1, soreness: 4,
  });
  const [weightInput, setWeightInput] = useState("");
  const [autoMsg, setAutoMsg] = useState("");

  const today = new Date().toISOString().slice(0, 10);
  const weekDay = new Date().getDay();

  useEffect(() => {
    try {
      setLogs(JSON.parse(localStorage.getItem(KEY) || "[]"));
      setWeights(JSON.parse(localStorage.getItem(WKEY) || "[]"));
    } catch (e) {}

    // Lue Shortcutin URL-parametrit
    const pr = readParams();
    if (Object.keys(pr).length) {
      setForm((f) => {
        const n = { ...f };
        if (pr.sleepHours) n.sleepHours = clamp(parseFloat(pr.sleepHours), 3, 11);
        if (pr.sleepQuality) n.sleepQuality = clamp(parseInt(pr.sleepQuality), 1, 5);
        if (pr.restingHR) n.restingHR = clamp(parseInt(pr.restingHR), 40, 90);
        if (pr.yesterdayLoad) n.yesterdayLoad = clamp(parseInt(pr.yesterdayLoad), 0, 3);
        if (pr.soreness) n.soreness = clamp(parseInt(pr.soreness), 1, 5);
        return n;
      });
      if (pr.weight) {
        const kg = parseFloat(pr.weight);
        if (kg) {
          try {
            const prev = JSON.parse(localStorage.getItem(WKEY) || "[]");
            const w = [...prev.filter((x) => x.date !== today), { date: today, kg }]
              .sort((a, b) => (a.date < b.date ? -1 : 1));
            setWeights(w);
            localStorage.setItem(WKEY, JSON.stringify(w));
          } catch (e) {}
        }
      }
      setAutoMsg("Tiedot luettu Apple Healthista ✓ Tarkista ja tallenna.");
    }
  }, []);

  useEffect(() => {
    const recent = logs.slice(-7);
    if (recent.length >= 3) {
      const avg = recent.reduce((s, x) => s + x.restingHR, 0) / recent.length;
      setBaselineHR(Math.round(avg));
    }
  }, [logs]);

  const readiness = useMemo(() => computeReadiness({ ...form, baselineHR }), [form, baselineHR]);
  // Etsi viimeisin kova treeni (sali/kesto) historiasta vuorottelua varten
  const lastHardType = useMemo(() => {
    for (let i = logs.length - 1; i >= 0; i--) {
      if (logs[i].hard === "sali" || logs[i].hard === "kesto") return logs[i].hard;
    }
    return null;
  }, [logs]);

  // Kuluvan viikon tilasto (ma–su): montako treenipäivää kirjattu + montako päivää viikosta jäljellä
  const weekStats = useMemo(() => {
    const now = new Date();
    const dow = (now.getDay() + 6) % 7; // 0=ma ... 6=su
    const monday = new Date(now); monday.setDate(now.getDate() - dow); monday.setHours(0,0,0,0);
    const mondayStr = monday.toISOString().slice(0, 10);
    // treenipäivä = ei lepo (plan ei ala "Lepo"/"Pakkolepo")
    let trainDays = 0;
    logs.forEach((l) => {
      if (l.date >= mondayStr && l.date <= today) {
        const isRest = /lepo/i.test(l.plan || "");
        if (!isRest && l.date !== today) trainDays++;
      }
    });
    const daysLeft = 7 - dow; // sis. tämä päivä
    return { trainDays, daysLeft };
  }, [logs, today]);

  const rec = useMemo(() => recommend(readiness, weekDay, lastHardType, weekStats), [readiness, weekDay, lastHardType, weekStats]);

  const currentWeight = weights.length ? weights[weights.length - 1].kg : USER.startWeight;
  const lost = USER.startWeight - currentWeight;
  const progress = clamp((lost / (USER.startWeight - USER.goalWeight)) * 100, 0, 100);
  const dailyCal = Math.round(bmr(currentWeight) * 1.45 - 500);

  function saveDay() {
    const entry = { date: today, ...form, readiness, plan: rec.type, hard: rec.hard || null };
    const next = [...logs.filter((l) => l.date !== today), entry].sort((a, b) => (a.date < b.date ? -1 : 1));
    setLogs(next);
    localStorage.setItem(KEY, JSON.stringify(next));
    setAutoMsg("Päivä tallennettu ✓");
    setTimeout(() => setAutoMsg(""), 3000);
  }
  function saveWeight() {
    const kg = parseFloat(weightInput.replace(",", "."));
    if (!kg) return;
    const next = [...weights.filter((w) => w.date !== today), { date: today, kg }]
      .sort((a, b) => (a.date < b.date ? -1 : 1));
    setWeights(next);
    localStorage.setItem(WKEY, JSON.stringify(next));
    setWeightInput("");
  }

  const toneColor = { high: "#16c784", mid: "#3b82f6", low: "#f59e0b", rest: "#94a3b8" }[rec.tone];

  return (
    <div style={S.page}>
      <div style={S.wrap}>
        <header style={S.header}>
          <div style={S.kicker}>HENKILÖKOHTAINEN VALMENTAJA</div>
          <h1 style={S.h1}>Treenivalmius tänään</h1>
        </header>

        {autoMsg && <div style={S.banner}>{autoMsg}</div>}

        <div style={S.card}>
          <div style={{ display: "flex", alignItems: "center", gap: 24 }}>
            <Ring value={readiness} color={toneColor} />
            <div>
              <div style={{ ...S.planType, color: toneColor }}>{rec.type}</div>
              <div style={S.muted}>
                Valmius {readiness}/100{baselineHR > 0 && ` · leposyke-baseline ${baselineHR}`}
              </div>
            </div>
          </div>
          <WorkoutPlan rec={rec} />
          <div style={S.calNote}>{rec.cal}</div>
          <div style={S.weekBalance}>
            Tällä viikolla treenipäiviä: {weekStats.trainDays} · lepoa vähintään 2/viikko
          </div>
          <WeekStrip today={weekDay} />
        </div>

        <div style={S.card}>
          <h2 style={S.h2}>Tämän aamun lukemat</h2>
          <p style={S.helper}>Täyttyvät automaattisesti kun avaat sivun Shortcutin kautta. Voit myös säätää käsin.</p>

          <Field label={`Unen kesto: ${form.sleepHours} h`}>
            <input type="range" min="3" max="11" step="0.5" value={form.sleepHours}
              onChange={(e) => setForm({ ...form, sleepHours: +e.target.value })} style={S.range} />
          </Field>
          <Field label={`Unen laatu: ${["", "huono", "välttävä", "ok", "hyvä", "erinomainen"][form.sleepQuality]}`}>
            <input type="range" min="1" max="5" step="1" value={form.sleepQuality}
              onChange={(e) => setForm({ ...form, sleepQuality: +e.target.value })} style={S.range} />
          </Field>
          <Field label={`Leposyke aamulla: ${form.restingHR} bpm`}>
            <input type="range" min="40" max="80" step="1" value={form.restingHR}
              onChange={(e) => setForm({ ...form, restingHR: +e.target.value })} style={S.range} />
          </Field>
          <Field label={`Eilinen kuormitus: ${["lepo", "kevyt", "keskiraskas", "raskas"][form.yesterdayLoad]}`}>
            <input type="range" min="0" max="3" step="1" value={form.yesterdayLoad}
              onChange={(e) => setForm({ ...form, yesterdayLoad: +e.target.value })} style={S.range} />
          </Field>
          <Field label={`Tuoreus: ${["", "todella kipeä", "kipeä", "ok", "tuore", "erittäin tuore"][form.soreness]}`}>
            <input type="range" min="1" max="5" step="1" value={form.soreness}
              onChange={(e) => setForm({ ...form, soreness: +e.target.value })} style={S.range} />
          </Field>

          <button style={S.btn} onClick={saveDay}>Tallenna päivä</button>
        </div>

        <div style={S.card}>
          <h2 style={S.h2}>Painonpudotus</h2>
          <div style={S.progressRow}>
            <span style={S.big}>{currentWeight.toFixed(1)} kg</span>
            <span style={S.muted}>tavoite {USER.goalWeight} kg</span>
          </div>
          <div style={S.barOuter}><div style={{ ...S.barInner, width: `${progress}%` }} /></div>
          <div style={S.muted}>
            Pudotettu {lost > 0 ? lost.toFixed(1) : "0"} / 10 kg · päiväkalori­tavoite ~{dailyCal} kcal
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <input value={weightInput} onChange={(e) => setWeightInput(e.target.value)}
              placeholder="Tämän aamun paino" style={S.input} inputMode="decimal" />
            <button style={S.btnSmall} onClick={saveWeight}>Kirjaa</button>
          </div>
        </div>

        {logs.length > 0 && (
          <div style={S.card}>
            <h2 style={S.h2}>Viime päivät</h2>
            {logs.slice(-7).reverse().map((l) => (
              <div key={l.date} style={S.historyRow}>
                <span style={S.muted}>{l.date}</span>
                <span style={{ fontWeight: 600 }}>{l.readiness}</span>
                <span style={S.muted}>{l.plan}</span>
              </div>
            ))}
          </div>
        )}

        <footer style={S.footer}>Suuntaa-antava valmennustyökalu, ei lääketieteellistä neuvontaa.</footer>
      </div>
    </div>
  );
}

function WorkoutPlan({ rec }) {
  return (
    <div style={S.plan}>
      {rec.warmup && rec.warmup.length > 0 && (
        <div style={S.planSection}>
          <div style={S.planHead}>Lämmittely</div>
          {rec.warmup.map((x, i) => <div key={i} style={S.planItem}>• {x}</div>)}
        </div>
      )}
      {rec.blocks.map((b, bi) => (
        <div key={bi} style={S.planSection}>
          <div style={S.planHead}>{b.title}</div>
          {b.items.map((x, i) => <div key={i} style={S.planItem}>{x.match(/^\d\./) ? x : "• " + x}</div>)}
        </div>
      ))}
      {rec.cooldown && rec.cooldown.length > 0 && (
        <div style={S.planSection}>
          <div style={S.planHead}>Jäähdyttely</div>
          {rec.cooldown.map((x, i) => <div key={i} style={S.planItem}>• {x}</div>)}
        </div>
      )}
    </div>
  );
}

function WeekStrip({ today }) {
  // Vain ti (salibandy) ja ke (kevennys) ovat kiinteät. Muut päivät valmius ratkaisee.
  const days = [
    { d: 1, l: "Ma", t: "Valmiuden mukaan" },
    { d: 2, l: "Ti", t: "Salibandy" },
    { d: 3, l: "Ke", t: "Kevennys" },
    { d: 4, l: "To", t: "Valmiuden mukaan" },
    { d: 5, l: "Pe", t: "Valmiuden mukaan" },
    { d: 6, l: "La", t: "Valmiuden mukaan" },
    { d: 0, l: "Su", t: "Valmiuden mukaan" },
  ];
  return (
    <div style={S.week}>
      {days.map((x) => (
        <div key={x.d} style={{ ...S.weekDay, ...(x.d === today ? S.weekDayActive : {}) }}>
          <div style={S.weekLabel}>{x.l}</div>
          <div style={S.weekTask}>{x.t}</div>
        </div>
      ))}
    </div>
  );
}

function Field({ label, children }) {
  return <div style={{ marginBottom: 18 }}><label style={S.label}>{label}</label>{children}</div>;
}

function Ring({ value, color }) {
  const r = 46, c = 2 * Math.PI * r;
  const off = c - (value / 100) * c;
  return (
    <svg width="120" height="120" viewBox="0 0 120 120">
      <circle cx="60" cy="60" r={r} fill="none" stroke="#1e293b" strokeWidth="10" />
      <circle cx="60" cy="60" r={r} fill="none" stroke={color} strokeWidth="10"
        strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
        transform="rotate(-90 60 60)" style={{ transition: "stroke-dashoffset .5s" }} />
      <text x="60" y="66" textAnchor="middle" fontSize="30" fontWeight="700" fill="#f1f5f9">{value}</text>
    </svg>
  );
}

const S = {
  page: { minHeight: "100vh", background: "#0b1120", color: "#f1f5f9",
    fontFamily: "-apple-system, system-ui, sans-serif", padding: "24px 16px" },
  wrap: { maxWidth: 520, margin: "0 auto" },
  header: { marginBottom: 20 },

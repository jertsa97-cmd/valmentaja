<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0b1120" />
<title>Valmentaja</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  input[type=range] { accent-color: #16c784; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const USER = { height: 187, age: 29, startWeight: 103, goalWeight: 93 };

function bmr(weight) {
  return 10 * weight + 6.25 * USER.height - 5 * USER.age + 5;
}
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

function computeReadiness({ sleepHours, sleepQuality, restingHR, baselineHR, yesterdayLoad, soreness }) {
  const sleepDur = clamp((sleepHours / 7.5) * 100, 0, 100);
  const sleepQ = (sleepQuality / 5) * 100;
  const sleepScore = sleepDur * 0.6 + sleepQ * 0.4;
  let hrScore = 80;
  if (baselineHR > 0) {
    const diff = restingHR - baselineHR;
    hrScore = clamp(100 - diff * 6, 0, 100);
  }
  const loadScore = [100, 85, 65, 45][yesterdayLoad] ?? 80;
  const soreScore = (soreness / 5) * 100;
  const total = sleepScore * 0.35 + hrScore * 0.25 + loadScore * 0.25 + soreScore * 0.15;
  return Math.round(clamp(total, 0, 100));
}

function recommend(readiness, weekDay) {
  if (readiness >= 80) return {
    type: "Kova treeni", tone: "high",
    session: weekDay % 2 === 0
      ? "Voima: täysi keho 5×5 (kyykky, penkki, veto, ylätalja, hauis). Lopuksi 10 min intervallit."
      : "HIIT + voima: 6×400 m / juoksumatto-intervalli + 3 kierrosta kehonpainoa.",
    cal: "Hyvä päivä korkeammalle aktiivisuudelle — voit syödä lähemmäs ylläpitoa.",
  };
  if (readiness >= 60) return {
    type: "Keskiraskas treeni", tone: "mid",
    session: "Tasainen kestävyys 40–50 min (juoksu/pyörä, syke 70–75 %) TAI tekniikkapainotteinen voima kevyemmillä painoilla.",
    cal: "Pidä vajaus maltillisena, ~400–500 kcal.",
  };
  if (readiness >= 40) return {
    type: "Kevyt aktiivinen palautuminen", tone: "low",
    session: "Reipas kävely 30–45 min, kevyt pyöräily tai liikkuvuus + venyttely 20 min. Ei kovaa kuormaa.",
    cal: "Säilytä proteiini korkealla (n. 2 g/kg), kevyt vajaus.",
  };
  return {
    type: "Lepopäivä", tone: "rest",
    session: "Täysi lepo tai kevyt kävely. Keho ei ole valmis kuormaan — palautuminen on nyt tärkeintä.",
    cal: "Syö lähelle ylläpitoa, riittävästi proteiinia ja unta.",
  };
}

const KEY = "pt_logs_v1";
const WKEY = "pt_weights_v1";

// Lukee URL-parametrit jotka Shortcut antaa, esim:
// ?sleepHours=7.2&restingHR=55&yesterdayLoad=2&weight=101.3
function readParams() {
  const p = new URLSearchParams(window.location.search);
  const out = {};
  ["sleepHours","sleepQuality","restingHR","yesterdayLoad","soreness","weight"].forEach((k) => {
    let v = p.get(k);
    if (v !== null && v !== "") {
      // siedä pilkkua desimaalierottimena ja mahdollista sekuntiarvoa
      v = v.replace(",", ".");
      out[k] = v;
    }
  });
  // Apple Healthin uni: tulee sekunteina ja jaksot päällekkäin (n. tuplana).
  // Hoidetaan muunnos kokonaan tässä, jotta Shortcutiin ei tarvitse koskea.
  if (out.sleepHours) {
    let sh = parseFloat(out.sleepHours);
    if (sh > 1000) {
      // raaka sekuntiarvo Applelta -> tunnit, ja poista tuplaus
      sh = sh / 7200;
    } else if (sh > 20) {
      // sekunteja mutta ei tuplattu
      sh = sh / 3600;
    }
    sh = Math.round(sh * 10) / 10;
    out.sleepHours = String(clamp(sh, 0, 14));
  }
  return out;
}

function App() {
  const [logs, setLogs] = useState([]);
  const [weights, setWeights] = useState([]);
  const [baselineHR, setBaselineHR] = useState(0);
  const [form, setForm] = useState({
    sleepHours: 7.5, sleepQuality: 4, restingHR: 58, yesterdayLoad: 1, soreness: 4,
  });
  const [weightInput, setWeightInput] = useState("");
  const [autoMsg, setAutoMsg] = useState("");

  const today = new Date().toISOString().slice(0, 10);
  const weekDay = new Date().getDay();

  useEffect(() => {
    try {
      setLogs(JSON.parse(localStorage.getItem(KEY) || "[]"));
      setWeights(JSON.parse(localStorage.getItem(WKEY) || "[]"));
    } catch (e) {}

    // Lue Shortcutin URL-parametrit
    const pr = readParams();
    if (Object.keys(pr).length) {
      setForm((f) => {
        const n = { ...f };
        if (pr.sleepHours) n.sleepHours = clamp(parseFloat(pr.sleepHours), 3, 11);
        if (pr.sleepQuality) n.sleepQuality = clamp(parseInt(pr.sleepQuality), 1, 5);
        if (pr.restingHR) n.restingHR = clamp(parseInt(pr.restingHR), 40, 90);
        if (pr.yesterdayLoad) n.yesterdayLoad = clamp(parseInt(pr.yesterdayLoad), 0, 3);
        if (pr.soreness) n.soreness = clamp(parseInt(pr.soreness), 1, 5);
        return n;
      });
      if (pr.weight) {
        const kg = parseFloat(pr.weight);
        if (kg) {
          try {
            const prev = JSON.parse(localStorage.getItem(WKEY) || "[]");
            const w = [...prev.filter((x) => x.date !== today), { date: today, kg }]
              .sort((a, b) => (a.date < b.date ? -1 : 1));
            setWeights(w);
            localStorage.setItem(WKEY, JSON.stringify(w));
          } catch (e) {}
        }
      }
      setAutoMsg("Tiedot luettu Apple Healthista ✓ Tarkista ja tallenna.");
    }
  }, []);

  useEffect(() => {
    const recent = logs.slice(-7);
    if (recent.length >= 3) {
      const avg = recent.reduce((s, x) => s + x.restingHR, 0) / recent.length;
      setBaselineHR(Math.round(avg));
    }
  }, [logs]);

  const readiness = useMemo(() => computeReadiness({ ...form, baselineHR }), [form, baselineHR]);
  const rec = useMemo(() => recommend(readiness, weekDay), [readiness, weekDay]);

  const currentWeight = weights.length ? weights[weights.length - 1].kg : USER.startWeight;
  const lost = USER.startWeight - currentWeight;
  const progress = clamp((lost / (USER.startWeight - USER.goalWeight)) * 100, 0, 100);
  const dailyCal = Math.round(bmr(currentWeight) * 1.45 - 500);

  function saveDay() {
    const entry = { date: today, ...form, readiness, plan: rec.type };
    const next = [...logs.filter((l) => l.date !== today), entry].sort((a, b) => (a.date < b.date ? -1 : 1));
    setLogs(next);
    localStorage.setItem(KEY, JSON.stringify(next));
    setAutoMsg("Päivä tallennettu ✓");
    setTimeout(() => setAutoMsg(""), 3000);
  }
  function saveWeight() {
    const kg = parseFloat(weightInput.replace(",", "."));
    if (!kg) return;
    const next = [...weights.filter((w) => w.date !== today), { date: today, kg }]
      .sort((a, b) => (a.date < b.date ? -1 : 1));
    setWeights(next);
    localStorage.setItem(WKEY, JSON.stringify(next));
    setWeightInput("");
  }

  const toneColor = { high: "#16c784", mid: "#3b82f6", low: "#f59e0b", rest: "#94a3b8" }[rec.tone];

  return (
    <div style={S.page}>
      <div style={S.wrap}>
        <header style={S.header}>
          <div style={S.kicker}>HENKILÖKOHTAINEN VALMENTAJA</div>
          <h1 style={S.h1}>Treenivalmius tänään</h1>
        </header>

        {autoMsg && <div style={S.banner}>{autoMsg}</div>}

        <div style={S.card}>
          <div style={{ display: "flex", alignItems: "center", gap: 24 }}>
            <Ring value={readiness} color={toneColor} />
            <div>
              <div style={{ ...S.planType, color: toneColor }}>{rec.type}</div>
              <div style={S.muted}>
                Valmius {readiness}/100{baselineHR > 0 && ` · leposyke-baseline ${baselineHR}`}
              </div>
            </div>
          </div>
          <div style={S.sessionBox}>{rec.session}</div>
          <div style={S.calNote}>{rec.cal}</div>
        </div>

        <div style={S.card}>
          <h2 style={S.h2}>Tämän aamun lukemat</h2>
          <p style={S.helper}>Täyttyvät automaattisesti kun avaat sivun Shortcutin kautta. Voit myös säätää käsin.</p>

          <Field label={`Unen kesto: ${form.sleepHours} h`}>
            <input type="range" min="3" max="11" step="0.5" value={form.sleepHours}
              onChange={(e) => setForm({ ...form, sleepHours: +e.target.value })} style={S.range} />
          </Field>
          <Field label={`Unen laatu: ${["", "huono", "välttävä", "ok", "hyvä", "erinomainen"][form.sleepQuality]}`}>
            <input type="range" min="1" max="5" step="1" value={form.sleepQuality}
              onChange={(e) => setForm({ ...form, sleepQuality: +e.target.value })} style={S.range} />
          </Field>
          <Field label={`Leposyke aamulla: ${form.restingHR} bpm`}>
            <input type="range" min="40" max="80" step="1" value={form.restingHR}
              onChange={(e) => setForm({ ...form, restingHR: +e.target.value })} style={S.range} />
          </Field>
          <Field label={`Eilinen kuormitus: ${["lepo", "kevyt", "keskiraskas", "raskas"][form.yesterdayLoad]}`}>
            <input type="range" min="0" max="3" step="1" value={form.yesterdayLoad}
              onChange={(e) => setForm({ ...form, yesterdayLoad: +e.target.value })} style={S.range} />
          </Field>
          <Field label={`Tuoreus: ${["", "todella kipeä", "kipeä", "ok", "tuore", "erittäin tuore"][form.soreness]}`}>
            <input type="range" min="1" max="5" step="1" value={form.soreness}
              onChange={(e) => setForm({ ...form, soreness: +e.target.value })} style={S.range} />
          </Field>

          <button style={S.btn} onClick={saveDay}>Tallenna päivä</button>
        </div>

        <div style={S.card}>
          <h2 style={S.h2}>Painonpudotus</h2>
          <div style={S.progressRow}>
            <span style={S.big}>{currentWeight.toFixed(1)} kg</span>
            <span style={S.muted}>tavoite {USER.goalWeight} kg</span>
          </div>
          <div style={S.barOuter}><div style={{ ...S.barInner, width: `${progress}%` }} /></div>
          <div style={S.muted}>
            Pudotettu {lost > 0 ? lost.toFixed(1) : "0"} / 10 kg · päiväkalori­tavoite ~{dailyCal} kcal
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <input value={weightInput} onChange={(e) => setWeightInput(e.target.value)}
              placeholder="Tämän aamun paino" style={S.input} inputMode="decimal" />
            <button style={S.btnSmall} onClick={saveWeight}>Kirjaa</button>
          </div>
        </div>

        {logs.length > 0 && (
          <div style={S.card}>
            <h2 style={S.h2}>Viime päivät</h2>
            {logs.slice(-7).reverse().map((l) => (
              <div key={l.date} style={S.historyRow}>
                <span style={S.muted}>{l.date}</span>
                <span style={{ fontWeight: 600 }}>{l.readiness}</span>
                <span style={S.muted}>{l.plan}</span>
              </div>
            ))}
          </div>
        )}

        <footer style={S.footer}>Suuntaa-antava valmennustyökalu, ei lääketieteellistä neuvontaa.</footer>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return <div style={{ marginBottom: 18 }}><label style={S.label}>{label}</label>{children}</div>;
}

function Ring({ value, color }) {
  const r = 46, c = 2 * Math.PI * r;
  const off = c - (value / 100) * c;
  return (
    <svg width="120" height="120" viewBox="0 0 120 120">
      <circle cx="60" cy="60" r={r} fill="none" stroke="#1e293b" strokeWidth="10" />
      <circle cx="60" cy="60" r={r} fill="none" stroke={color} strokeWidth="10"
        strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
        transform="rotate(-90 60 60)" style={{ transition: "stroke-dashoffset .5s" }} />
      <text x="60" y="66" textAnchor="middle" fontSize="30" fontWeight="700" fill="#f1f5f9">{value}</text>
    </svg>
  );
}

const S = {
  page: { minHeight: "100vh", background: "#0b1120", color: "#f1f5f9",
    fontFamily: "-apple-system, system-ui, sans-serif", padding: "24px 16px" },
  wrap: { maxWidth: 520, margin: "0 auto" },
  header: { marginBottom: 20 },
  kicker: { fontSize: 11, letterSpacing: 2, color: "#64748b", fontWeight: 700 },
  h1: { fontSize: 28, margin: "4px 0 0", fontWeight: 800 },
  banner: { background: "#16c78422", border: "1px solid #16c784", color: "#16c784",
    padding: "12px 16px", borderRadius: 12, marginBottom: 16, fontSize: 14, fontWeight: 600 },
  card: { background: "#111a2e", borderRadius: 18, padding: 22, marginBottom: 16, border: "1px solid #1e293b" },
  planType: { fontSize: 24, fontWeight: 800 },
  muted: { color: "#94a3b8", fontSize: 14 },
  sessionBox: { marginTop: 16, padding: 14, background: "#0b1120", borderRadius: 12, lineHeight: 1.5, fontSize: 15 },
  calNote: { marginTop: 10, fontSize: 13, color: "#cbd5e1" },
  h2: { fontSize: 17, margin: "0 0 4px", fontWeight: 700 },
  helper: { fontSize: 13, color: "#94a3b8", margin: "0 0 16px" },
  label: { display: "block", fontSize: 14, marginBottom: 8, color: "#e2e8f0" },
  range: { width: "100%" },
  btn: { width: "100%", padding: "14px", background: "#16c784", color: "#04221a", border: "none",
    borderRadius: 12, fontSize: 16, fontWeight: 700, cursor: "pointer" },
  btnSmall: { padding: "0 18px", background: "#3b82f6", color: "#fff", border: "none",
    borderRadius: 10, fontWeight: 700, cursor: "pointer" },
  input: { flex: 1, padding: "12px", background: "#0b1120", border: "1px solid #1e293b",
    borderRadius: 10, color: "#f1f5f9", fontSize: 16 },
  progressRow: { display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 },
  big: { fontSize: 30, fontWeight: 800 },
  barOuter: { height: 10, background: "#1e293b", borderRadius: 6, overflow: "hidden" },
  barInner: { height: "100%", background: "#16c784", transition: "width .5s" },
  historyRow: { display: "grid", gridTemplateColumns: "1fr auto 1.2fr", gap: 10, padding: "8px 0",
    borderBottom: "1px solid #1e293b", fontSize: 14, alignItems: "center" },
  footer: { textAlign: "center", fontSize: 12, color: "#475569", marginTop: 8 },
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
